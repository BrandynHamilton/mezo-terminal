[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
mezo_mainnet = "https://mezo-mainnet-rpc.example.com"
mezo_testnet = "https://mezo-testnet-rpc.example.com"
mezo_local = "http://localhost:8545"
